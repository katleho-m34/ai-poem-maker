 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Poem Generator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
 </head>

 <body>
   <div class="container">
    <header>
      <h1>AI Poem Generator🤖</h1>
   </header>

   <main>
      <div class="form-container"></div>
      <form id="poem-generator"> 
         <input type="text" placeholder="Enter the topic of the poem..." required class="instructions" id="user-instructions">
         <input type="submit" class="button">
      <div class="hint">i.e Flowers, Romance...</div>
      </form>
      </div>

      <div class="poem hidden blink" id="poem">
      </div>
   </main>

   <footer>This AI project was coded by 

      <a href="https://github.com/katleho-m34" target="_blank">Katleho Mokoena</a>

      and is open-sourced on

      <a href="https://github.com/katleho-m34/ai-poem-maker" target="_blank">GitHub</a>

      and is hosted on 
      
      <a href="https://myaijokemaker.netlify.app/" target="_blank">Netlify</a>
   </footer>
   </div>

   <script src="script.js"></script>
 </body>
 </html>
